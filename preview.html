<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dkong Capture - Previsualizar Descarga</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #2c251f; color: #f4efe6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
        }
        .header {
            background-color: #3e352d;
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #d97736;
        }
        .header-content h1 { margin: 0; font-size: 18px; color: #d97736; }
        .header-content p { margin: 2px 0 0; font-size: 12px; color: #aaa; }
        
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn {
            background-color: #594a3d; border: 1px solid #736151;
            color: #f4efe6; padding: 8px 15px; border-radius: 4px; cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background-color: #736151; }
        .btn-primary { background-color: #d97736; color: #2c251f; border:none; }
        .btn-primary:hover { background-color: #b8622b; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-container {
            flex-grow: 1; margin: 0 20px;
            background-color: #1a1512; border-radius: 10px; overflow: hidden;
            display: none; height: 20px; border: 1px solid #3e352d; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%; background-color: #d97736;
            transition: width 0.3s ease;
        }
        .progress-text {
            position: absolute; width: 100%; text-align: center;
            top: 0; left: 0; font-size: 12px; line-height: 20px;
            color: white; font-weight: bold; text-shadow: 1px 1px 2px black;
        }

        .frames-container {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: flex-start; align-content: flex-start;
        }
        .frame-box {
            position: relative; width: 180px; 
            background: #1a1512; border: 2px solid transparent; border-radius: 4px;
            overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .delete-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: none;
            z-index: 10;
        }

        .frame-box:hover .delete-icon {
            display: flex;
        }

        .frame-box.deleted {
            opacity: 0.3;
            border: 2px solid red;
        }
        .frame-box.deleted .delete-icon {
            display: flex;
        }
        
        /* Barra Progreso */
        .frame-box:hover { transform: scale(1.05); border-color: #d97736; z-index: 10; }
        .frame-box img { width: 100%; display: block; object-fit: contain; }
        .frame-box .badge {
            position: absolute; top: 5px; left: 5px;
            background: rgba(0,0,0,0.8); color: #d97736;
            font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px;
        }
        
        .success-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(92, 113, 94, 0.7); display: none;
            justify-content: center; align-items: center; font-size: 30px;
        }
        .frame-box.downloaded .success-overlay { display: flex; }
        .frame-box.downloaded { border-color: #5c715e; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-content">
            <h1 id="mangaTitle">Cargando...</h1>
            <p id="mangaCount">Buscando imágenes...</p>
        </div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="controls">
            <button class="btn" id="btnChooseFolder">📁 Elegir Carpeta Destino</button>
            <button class="btn btn-primary" id="btnConfirmDownload" disabled>⬇️ Confirmar Descarga</button>
        </div>
    </div>

    <div class="frames-container" id="framesContainer">
        <!-- Frames go here -->
    </div>

    <!-- Scripts -->
    <script src="storage_manager.js"></script>
    <script src="preview.js"></script>
</body>
</html>
