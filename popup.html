<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dkong Scraper</title>
    <style>
        body {
            width: 380px;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1c1714;
            color: #fff;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            font-size: 16px;
            margin-top: 0;
            color: #e5d3b3;
            border-bottom: 1px solid #45362e;
            padding-bottom: 10px;
            text-align: center;
        }
        p.instrucciones {
            font-size: 12px;
            color: #a49182;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        button {
            width: 100%;
            background-color: #c85a17;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #e63946;
        }
        button:active {
            transform: scale(0.98);
        }
        button.btn-copy {
            background-color: #45362e;
            display: none;
            margin-top: 10px;
        }
        button.btn-copy:hover {
            background-color: #5c4a3d;
        }
        
        #status {
            font-size: 12px;
            color: #e63946;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Contenedor de Tarjetas */
        #results-container {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: hidden;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
            font-size: 12px;
            color: #e5d3b3;
        }

        .controls-row label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #cards-list {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        #cards-list::-webkit-scrollbar {
            width: 6px;
        }
        #cards-list::-webkit-scrollbar-track {
            background: #2a221d; 
            border-radius: 4px;
        }
        #cards-list::-webkit-scrollbar-thumb {
            background: #45362e; 
            border-radius: 4px;
        }

        /* Tarjeta individual */
        .card {
            display: flex;
            align-items: center;
            background-color: #2a221d;
            border: 1px solid #45362e;
            border-radius: 8px;
            padding: 8px;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .card:hover {
            background-color: #352a23;
        }
        .card.selected {
            border-color: #c85a17;
            background-color: rgba(200, 90, 23, 0.1);
        }

        .card-checkbox {
            margin: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #c85a17;
        }

        .card-thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            background-color: #1c1714;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #a49182;
            overflow: hidden;
        }

        .card-info {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-url {
            font-size: 11px;
            color: #e5d3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
        }

        .footer {
            font-size: 10px;
            text-align: center;
            color: #5c4a3d;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>🐒 Dkong Scraper Extension</h2>
    <p class="instrucciones">
        1. Ve a tu sección de Guardados/Favoritos (X, IG o TikTok).<br>
        2. Haz "scroll" hacia abajo con tu mouse.<br>
        3. Haz clic en el botón de abajo.
    </p>

    <button id="btn-extract">🔍 Extraer Enlaces en Pantalla</button>
    <div id="status"></div>
    
    <div id="results-container">
        <div class="controls-row">
            <label>
                <input type="checkbox" id="cb-select-all" checked>
                Seleccionar todos
            </label>
            <span id="selected-count">0 seleccionados</span>
        </div>
        <div id="cards-list"></div>
        <button id="btn-copy" class="btn-copy">📋 Copiar Seleccionados</button>
    </div>

    <div class="footer">DkongMediaConverter Tool</div>

    <script src="popup.js"></script>
</body>
</html>
