<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dkong Capture - Previsualizar Multimedia</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #2c251f; color: #f4efe6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            justify-content: center; align-items: center;
        }
        .header {
            width: 100%;
            background-color: #3e352d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d97736;
            position: absolute; top: 0; left: 0; box-sizing: border-box;
        }
        .header h1 { margin: 0; font-size: 18px; color: #d97736; }
        .controls { display: flex; gap: 10px; }
        .btn {
            background-color: #594a3d; border: 1px solid #736151;
            color: #f4efe6; padding: 8px 15px; border-radius: 4px; cursor: pointer;
        }
        .btn:hover { background-color: #736151; }
        .btn-primary { background-color: #d97736; color: #2c251f; font-weight: bold; border:none; }
        .btn-primary:hover { background-color: #b8622b; }
        .btn-danger { background-color: #a8463c; color: #f4efe6; border:none; font-weight: bold; }
        .btn-danger:hover { background-color: #8f382f; }
        
        .media-container {
            margin-top: 60px;
            max-width: 80vw; max-height: 70vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        video { max-width: 100%; max-height: 60vh; background: #000; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        audio { display: none; }
        #audioCanvas { width: 500px; height: 120px; background: #1a1512; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); cursor: pointer; }
        .custom-controls { display: none; gap: 15px; margin-top: 15px; }
        
        .timeline-container {
            width: 100%; max-width: 600px; margin-top: 20px; display: none;
            background: #3e352d; padding: 15px; border-radius: 8px; box-sizing: border-box;
        }
        .timeline-container.visible { display: block; }
        .sliders {
            position: relative; width: 100%; height: 30px; margin-top: 10px;
        }
        input[type=range] {
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none;
            -webkit-appearance: none; background: transparent; margin:0; height: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            pointer-events: all; position: relative; z-index: 10;
            -webkit-appearance: none; width: 15px; height: 25px; background: #d97736; cursor: ew-resize; border-radius: 3px;
        }
        .track {
            position: absolute; width: 100%; height: 6px; background: #594a3d; top: 12px; border-radius: 3px;
        }
        .fill {
            position: absolute; height: 6px; background: #d97736; top: 12px;
        }
        #timeDisplay { font-family: monospace; font-size: 14px; text-align: center; margin-bottom: 5px;}
        
        /* Export overlay */
        #exportOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); z-index: 9999; display: none;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #exportProgress { width: 300px; height: 10px; background: #3e352d; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #exportBar { width: 0%; height: 100%; background: #d97736; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="title">Previsualizar Grabación</h1>
        <div class="controls">
            <button class="btn" id="btnLoop" style="background:#594a3d;">🔁 Bucle Activado</button>
            <button class="btn btn-danger" id="btnDiscard">🗑️ Desechar</button>
            <button class="btn btn-primary" id="btnSave">💾 Guardar en Disco</button>
        </div>
    </div>

    <div class="media-container" id="mediaContainer">
        <!-- Injected via JS -->
    </div>
    
    <div class="custom-controls" id="customControls">
        <button class="btn btn-primary" id="btnPlayPause" style="font-size: 18px; padding: 10px 30px;">▶️ Reproducir</button>
    </div>
    
    <div class="timeline-container" id="timelineContainer">
        <div id="timeDisplay">00:00 / 00:00</div>
        <div class="sliders">
            <div class="track"></div>
            <div class="fill" id="sliderFill"></div>
            <input type="range" id="startSlider" min="0" max="100" value="0" step="0.1">
            <input type="range" id="endSlider" min="0" max="100" value="100" step="0.1">
        </div>
    </div>

    <div id="exportOverlay">
        <h2 style="color:#d97736;">Exportando Recorte...</h2>
        <div id="exportProgress"><div id="exportBar"></div></div>
    </div>

    <script src="storage_manager.js"></script>
    <script src="media_preview.js"></script>
</body>
</html>
